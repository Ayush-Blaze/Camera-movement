<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Fairy Lights – Hand Tracking</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* Mirrored video feed */
  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.55;
  }

  /* Particle canvas on top */
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* UI overlay */
  #ui {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  #startBtn {
    pointer-events: all;
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.6);
    color: white;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    padding: 0.9em 2.2em;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  #startBtn:hover {
    background: rgba(255,255,255,0.1);
    border-color: white;
    box-shadow: 0 0 30px rgba(255,200,100,0.3);
  }

  #subtitle {
    margin-top: 1rem;
    color: rgba(255,255,255,0.35);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  #status {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 30;
    white-space: nowrap;
  }

  #loading {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    display: none;
  }
  #loading p {
    color: rgba(255,255,255,0.6);
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,200,100,0.8);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 15;
  }
</style>
</head>
<body>
<div id="container">
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="vignette"></div>

  <div id="ui">
    <button id="startBtn">✨ Start Camera</button>
    <p id="subtitle">fairy lights follow your fingers</p>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading hand tracking…</p>
  </div>

  <div id="status">raise your hands ✦</div>
</div>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const loadingEl = document.getElementById('loading');
const uiEl    = document.getElementById('ui');
const statusEl = document.getElementById('status');

// Resize canvas to window
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Particle system ───────────────────────────────────────────────
const particles = [];

const COLORS = [
  '#ff6b6b','#ff9f43','#ffeaa7','#55efc4',
  '#74b9ff','#a29bfe','#fd79a8','#fdcb6e',
  '#00cec9','#e17055','#81ecec','#fab1a0',
  '#ffffff','#ffe8a1','#b8f0e6'
];

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawStar(cx, cy, outerR, innerR, color, alpha) {
  const spikes = 4;
  let rot = -Math.PI / 2;
  const step = Math.PI / spikes;
  // glow
  const g = ctx.createRadialGradient(cx,cy,0, cx,cy,outerR*2.5);
  g.addColorStop(0, hexToRgba(color, alpha*0.7));
  g.addColorStop(1, hexToRgba(color, 0));
  ctx.beginPath();
  ctx.arc(cx,cy,outerR*2.5,0,Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();
  // star
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot)*outerR, cy + Math.sin(rot)*outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot)*innerR, cy + Math.sin(rot)*innerR);
    rot += step;
  }
  ctx.closePath();
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.fill();
}

class Particle {
  constructor(x, y) {
    this.x = x + (Math.random()-0.5)*18;
    this.y = y + (Math.random()-0.5)*18;
    this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.maxSize = Math.random()*6+2;
    this.size = this.maxSize;
    this.alpha = 1;
    this.vx = (Math.random()-0.5)*2.8;
    this.vy = (Math.random()-0.5)*2.8 - 0.6;
    this.gravity = 0.035;
    this.life = 1;
    this.decay = Math.random()*0.018+0.007;
    this.twinkle = Math.random()*Math.PI*2;
    this.twinkleSpeed = Math.random()*0.18+0.06;
    this.tail = [];
    this.tailLen = Math.floor(Math.random()*8)+3;
    this.isStar = Math.random() > 0.55;
  }
  update() {
    this.tail.unshift({x:this.x, y:this.y});
    if (this.tail.length > this.tailLen) this.tail.pop();
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.985;
    this.life -= this.decay;
    this.alpha = Math.max(0, this.life);
    this.twinkle += this.twinkleSpeed;
    this.size = this.maxSize * (0.65 + 0.35*Math.sin(this.twinkle));
  }
  draw() {
    if (this.alpha <= 0) return;
    // tail wire
    if (this.tail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.tail[0].x, this.tail[0].y);
      for (let i=1;i<this.tail.length;i++) ctx.lineTo(this.tail[i].x, this.tail[i].y);
      ctx.strokeStyle = `rgba(255,255,255,${this.alpha*0.12})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
    const ta = this.alpha*(0.6+0.4*Math.sin(this.twinkle));
    if (this.isStar) {
      drawStar(this.x, this.y, this.size, this.size*0.4, this.color, ta);
    } else {
      const gr = ctx.createRadialGradient(this.x,this.y,0, this.x,this.y,this.size*2.8);
      gr.addColorStop(0, hexToRgba(this.color, ta));
      gr.addColorStop(0.45, hexToRgba(this.color, ta*0.5));
      gr.addColorStop(1, hexToRgba(this.color, 0));
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size*2.8,0,Math.PI*2);
      ctx.fillStyle = gr;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size*0.45,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${ta})`;
      ctx.fill();
    }
  }
  isDead() { return this.life <= 0; }
}

// finger tip landmark indices
const FINGERTIPS = [4, 8, 12, 16, 20];

let prevTips = {};
let handLandmarks = []; // array of hands, each hand = array of 21 landmarks

// ─── Spawn particles along finger movement ──────────────────────
function spawnFromHands() {
  handLandmarks.forEach((hand, hi) => {
    FINGERTIPS.forEach(idx => {
      const lm = hand[idx];
      // MediaPipe gives normalized coords (0-1), mirrored X
      const x = (1 - lm.x) * canvas.width;
      const y = lm.y * canvas.height;

      const key = `${hi}_${idx}`;
      const prev = prevTips[key];

      if (prev) {
        const dx = x - prev.x;
        const dy = y - prev.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        const steps = Math.max(1, Math.min(8, Math.floor(dist/6)));
        for (let s=0; s<steps; s++) {
          const px = prev.x + dx*(s/steps);
          const py = prev.y + dy*(s/steps);
          const count = Math.ceil(dist/8)+1;
          for (let i=0;i<Math.min(count,5);i++) {
            particles.push(new Particle(px, py));
          }
        }
        // extra sparkle burst on fast movement
        if (dist > 20) {
          for (let i=0;i<4;i++) {
            const p = new Particle(x,y);
            p.vx = (Math.random()-0.5)*5;
            p.vy = (Math.random()-0.5)*5;
            p.maxSize = Math.random()*8+3;
            p.size = p.maxSize;
            p.decay = 0.01;
            particles.push(p);
          }
        }
      } else {
        // first frame — idle sparkle
        for (let i=0;i<2;i++) particles.push(new Particle(x,y));
      }
      prevTips[key] = {x,y};
    });
  });

  // clean up keys for hands no longer tracked
  const activeKeys = new Set();
  handLandmarks.forEach((_, hi) => FINGERTIPS.forEach(idx => activeKeys.add(`${hi}_${idx}`)));
  Object.keys(prevTips).forEach(k => { if (!activeKeys.has(k)) delete prevTips[k]; });
}

// ─── Render loop ────────────────────────────────────────────────
function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  spawnFromHands();
  for (let i=particles.length-1;i>=0;i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].isDead()) particles.splice(i,1);
  }
  requestAnimationFrame(animate);
}
animate();

// ─── MediaPipe Hands setup ──────────────────────────────────────
let mpHands, camera;

async function startCamera() {
  uiEl.style.display = 'none';
  loadingEl.style.display = 'flex';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();

    mpHands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    mpHands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6
    });

    mpHands.onResults(results => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handLandmarks = results.multiHandLandmarks;
        statusEl.textContent = `✦ ${handLandmarks.length} hand${handLandmarks.length>1?'s':''} detected ✦`;
      } else {
        handLandmarks = [];
        prevTips = {};
        statusEl.textContent = 'raise your hands ✦';
      }
    });

    camera = new Camera(video, {
      onFrame: async () => { await mpHands.send({ image: video }); },
      width: 1280,
      height: 720
    });
    await camera.start();

    loadingEl.style.display = 'none';
    statusEl.textContent = 'raise your hands ✦';

  } catch (err) {
    loadingEl.style.display = 'none';
    uiEl.style.display = 'flex';
    uiEl.innerHTML = `<p style="color:rgba(255,100,100,0.8);font-size:0.9rem;text-align:center;padding:2rem;letter-spacing:0.1em;">Camera access denied.<br><br>Please allow camera permissions<br>and reload the page.</p>`;
    console.error(err);
  }
}

startBtn.addEventListener('click', startCamera);
</script>
</body>
</html>
